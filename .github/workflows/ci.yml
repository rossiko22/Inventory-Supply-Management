name: Inventory Microservices CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-warehouse-microservice:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build and test warehouse service
        working-directory: services/warehouse-service
        run: mvn clean package -DskipTests=false

      - name: Build Docker image
        working-directory: services/warehouse-service
        run: docker build -t warehouse-service:latest .

  build-inventory-microservice:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build and test inventory service
        working-directory: services/inventory-service
        run: mvn clean package -DskipTests=false

      - name: Build Docker image
        working-directory: services/inventory-service
        run: docker build -t inventory-service:latest .

  build-order-microservice:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        working-directory: services/order-service
        run: dotnet restore

      - name: Build order service
        working-directory: services/order-service
        run: dotnet build --no-restore -c Release

      - name: Run unit tests
        working-directory: services/order-service
        run: dotnet test order-service.Tests/order-service.Tests.csproj --no-build -c Release

      - name: Build Docker image
        working-directory: services/order-service
        run: docker build -t order-service:latest .
  build-notification-microservice:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/notification-service/package-lock.json

      - name: Install dependencies
        working-directory: services/notification-service
        run: npm ci

      - name: Build notification service
        working-directory: services/notification-service
        run: npm run build

      - name: Run unit tests
        working-directory: services/notification-service
        run: npm test

      - name: Build Docker image
        working-directory: services/notification-service
        run: docker build -t notification-service:latest .