name: Warehouse Service CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-test-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      - name: Build Warehouse Service
        working-directory: services/warehouse-service
        run: mvn clean package -DskipTests=false

      - name: Run Unit Tests
        working-directory: services/warehouse-service
        run: mvn test

      - name: Build Docker Image
        working-directory: services/warehouse-service
        run: docker build -t warehouse-service:latest .

      - name: List Docker Images
        run: docker images
