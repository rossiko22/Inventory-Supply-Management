<div class="relative">

  <button (click)="toggle()"
    class="relative p-2 rounded-lg text-gray-500 hover:text-gray-900 hover:bg-gray-100
           dark:text-gray-400 dark:hover:text-white dark:hover:bg-gray-800 transition-colors">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none"
         viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002
           6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388
           6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3
           0 11-6 0v-1m6 0H9"/>
    </svg>
    @if (svc.hasUnread()) {
      <span class="absolute top-1 right-1 flex items-center justify-center
                   min-w-[16px] h-4 px-1 rounded-full bg-red-500 text-white
                   text-[10px] font-semibold leading-none">
        {{ svc.unreadCount() > 99 ? '99+' : svc.unreadCount() }}
      </span>
    }
  </button>

  @if (isOpen()) {
    <div class="absolute right-0 top-full mt-2 w-80 z-50 bg-white dark:bg-gray-900
                border border-gray-200 dark:border-gray-700 rounded-xl shadow-xl overflow-hidden">

      <div class="flex items-center justify-between px-4 py-3
                  border-b border-gray-100 dark:border-gray-800">
        <span class="text-sm font-semibold text-gray-900 dark:text-white">
          Notifications
          @if (svc.unreadCount() > 0) {
            <span class="ml-1.5 text-xs text-gray-400">({{ svc.unreadCount() }} unread)</span>
          }
        </span>
        @if (svc.hasUnread()) {
          <button (click)="svc.markAllAsRead()"
            class="text-xs text-indigo-600 dark:text-indigo-400 hover:underline">
            Mark all read
          </button>
        }
      </div>

      <div class="max-h-96 overflow-y-auto divide-y divide-gray-100 dark:divide-gray-800">
        @for (n of svc.notifications(); track n.id) {
          <div (click)="onItemClick(n)"
            class="flex gap-3 px-4 py-3 cursor-pointer transition-colors
                   hover:bg-gray-50 dark:hover:bg-gray-800/60"
            [class.bg-indigo-50]="!n.read"
            [class.dark:bg-indigo-950]="!n.read">

            <div class="mt-1.5 shrink-0">
              <span class="block w-2 h-2 rounded-full {{ dotClass(n.severity) }}"></span>
            </div>

            <div class="flex-1 min-w-0">
              <div class="flex items-start justify-between gap-2">
                <p class="text-sm font-medium text-gray-900 dark:text-white leading-snug">
                  {{ n.title }}
                </p>
                <span class="text-[10px] shrink-0 px-1.5 py-0.5 rounded-full font-medium
                             {{ badgeClass(n.severity) }}">
                  {{ n.category }}
                </span>
              </div>
              <p class="text-xs text-gray-500 dark:text-gray-400 mt-0.5 leading-snug">
                {{ n.message }}
              </p>
              <p class="text-[10px] text-gray-400 dark:text-gray-500 mt-1">
                {{ timeAgo(n.createdAt) }}
              </p>
            </div>
          </div>
        } @empty {
          <div class="px-4 py-8 text-center text-sm text-gray-400">
            No notifications yet
          </div>
        }
      </div>

    </div>
  }

</div>
