services:

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ──────────────────────────────────────────
  # Messaging
  # ──────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_NUM_PARTITION: 3
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - backend

  # ──────────────────────────────────────────
  # Databases  (shared defaults via extension)
  # ──────────────────────────────────────────
  x-db-defaults: &db-defaults
    image: postgres:16-alpine
    restart: unless-stopped
    environment: &db-env
      POSTGRES_USER: ${DB_USER:-administrator}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  auth-db:
    <<: *db-defaults
    container_name: auth-db
    environment:
      <<: *db-env
      POSTGRES_DB: users
    ports:
      - "5432:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data

  company-db:
    <<: *db-defaults
    container_name: company-db
    environment:
      <<: *db-env
      POSTGRES_DB: companies
    ports:
      - "5433:5432"
    volumes:
      - company_db_data:/var/lib/postgresql/data

  fleet-db:
    <<: *db-defaults
    container_name: fleet-db
    environment:
      <<: *db-env
      POSTGRES_DB: fleet
    ports:
      - "5434:5432"
    volumes:
      - fleet_db_data:/var/lib/postgresql/data

  warehouse-db:
    <<: *db-defaults
    container_name: warehouse-db
    environment:
      <<: *db-env
      POSTGRES_DB: warehouses
    ports:
      - "5435:5432"
    volumes:
      - warehouse_db_data:/var/lib/postgresql/data

  product-db:
    <<: *db-defaults
    container_name: product-db
    environment:
      <<: *db-env
      POSTGRES_DB: products
    ports:
      - "5436:5432"
    volumes:
      - product_db_data:/var/lib/postgresql/data

  inventory-db:
    <<: *db-defaults
    container_name: inventory-db
    environment:
      <<: *db-env
      POSTGRES_DB: inventory
    ports:
      - "5437:5432"
    volumes:
      - inventory_db_data:/var/lib/postgresql/data

  order-db:
    <<: *db-defaults
    container_name: order-db
    environment:
      <<: *db-env
      POSTGRES_DB: orders
    ports:
      - "5438:5432"
    volumes:
      - order_db_data:/var/lib/postgresql/data

  notification-db:
    <<: *db-defaults
    container_name: notification-db
    environment:
      <<: *db-env
      POSTGRES_DB: notifications
    ports:
      - "5439:5432"
    volumes:
      - notification_db_data:/var/lib/postgresql/data

