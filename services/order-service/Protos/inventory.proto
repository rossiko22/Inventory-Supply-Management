syntax = "proto3";

// Java options - keep these, they are ignored by C# compiler
option java_package = "com.marko.logistics.inventory.grpc";
option java_multiple_files = true;
option java_outer_classname = "InventoryProto";

// C# option - tells protoc where to put generated classes
option csharp_namespace = "OrderService.Protos";

service InventoryService {
  rpc UpdateInventory (InventoryRequest) returns (InventoryResponse);
}

message InventoryRequest {
  string productId = 1;
  string warehouseId = 2;
  int32 quantity = 3;
}

message InventoryResponse {
  bool success = 1;
  string message = 2;
}