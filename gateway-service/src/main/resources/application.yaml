server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/auth/**
            - id: company-service
              uri: http://localhost:8082
              predicates:
                - Path=/companies/**
            - id: fleet-service
              uri: http://localhost:8083
              predicates:
                - Path=/drivers/**,/vehicles/**
            - id: warehouse-service
              uri: http://localhost:8084
              predicates:
                - Path=/warehouses